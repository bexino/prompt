<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Hub - Markdown 快捷复制工具</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              300: '#c4b5fd',
              400: '#a78bfa',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
              800: '#5b21b6',
              900: '#4c1d95',
            }
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 9999px;
    }
    .dark ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.2);
    }

    /* Glow Hover Effect */
    .glow-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glow-hover:hover {
      box-shadow: 0 10px 30px -10px rgba(124, 58, 237, 0.15);
      transform: translateY(-2px);
    }
    .dark .glow-hover:hover {
      box-shadow: 0 10px 30px -10px rgba(124, 58, 237, 0.4);
      transform: translateY(-2px);
    }

    /* Active Animation */
    .btn-scale {
      transition: transform 0.1s ease;
    }
    .btn-scale:active {
      transform: scale(0.95);
    }

    /* Highlight matching terms in search */
    mark {
      padding: 0px 2px;
      margin: 0px 1px;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300 font-sans">

  <!-- Header -->
  <header class="sticky top-0 z-40 w-full border-b border-slate-200/50 dark:border-slate-800/50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md transition-colors duration-300">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-violet-600 flex items-center justify-center shadow-lg shadow-indigo-500/20 dark:shadow-indigo-500/10">
          <i data-lucide="zap" class="w-5 h-5 text-white"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold tracking-tight bg-gradient-to-r from-indigo-600 to-violet-500 dark:from-indigo-400 dark:to-violet-400 bg-clip-text text-transparent">Prompt Hub</h1>
          <p class="text-xs text-slate-500 dark:text-slate-400">Markdown 快捷复制工具</p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <!-- Theme Toggle -->
        <button id="theme-toggle" onclick="toggleTheme()" class="btn-scale p-2 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all duration-200 text-slate-500 dark:text-slate-400" aria-label="切换主题">
          <i data-lucide="moon" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Container (Centered Single Column) -->
  <main class="flex-1 max-w-3xl w-full mx-auto px-4 sm:px-6 py-8">
    <div class="flex flex-col gap-6 w-full">
      
      <!-- Search Input Container -->
      <div class="relative w-full">
        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 dark:text-slate-500">
          <i data-lucide="search" class="w-4 h-4"></i>
        </div>
        <input type="text" id="search-input"
          class="w-full pl-10 pr-10 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700/50 rounded-2xl outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm placeholder-slate-400 dark:placeholder-slate-500 text-slate-700 dark:text-slate-300 transition-all shadow-sm"
          placeholder="输入关键词搜索 Prompt..."
          oninput="onSearchChange(this.value)">
        <!-- Clear Search button -->
        <button id="clear-search-btn" onclick="clearSearch()" class="hidden absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
          <i data-lucide="x" class="w-4.5 h-4.5"></i>
        </button>
      </div>

      <!-- Prompts Dynamic List Container (Space-y-4 for beautiful card spacing) -->
      <div id="prompts-list-root" class="space-y-4 min-h-[30rem]">
        <!-- Dynamic cards and headers will be rendered here -->
      </div>

      <!-- Empty state placeholder -->
      <div id="empty-state" class="hidden flex flex-col items-center justify-center py-16 px-4 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-sm">
        <div class="w-16 h-16 rounded-full bg-slate-100 dark:bg-slate-700/50 text-slate-400 dark:text-slate-500 flex items-center justify-center mb-4">
          <i data-lucide="alert-circle" class="w-8 h-8"></i>
        </div>
        <h3 class="text-base font-semibold text-slate-800 dark:text-slate-100 mb-1">未找到匹配项</h3>
        <p class="text-sm text-slate-500 dark:text-slate-400 text-center max-w-sm">
          找不到与您的搜索词相符的 Prompt。请检查拼写，或者清空搜索重试。
        </p>
        <button onclick="clearSearch()" class="mt-4 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs font-semibold shadow-md btn-scale">
          清除搜索
        </button>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="mt-auto border-t border-slate-200/50 dark:border-slate-800/50 bg-white dark:bg-slate-900 transition-colors duration-300 py-6">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
      <p class="text-xs text-slate-500 dark:text-slate-400 text-center sm:text-left">
        &copy; 2026 Prompt Hub. 纯本地解析，无网络上传，保护您的隐私。
      </p>
      <div class="flex items-center gap-4 text-xs text-slate-400 dark:text-slate-500">
        <span>基于 Tailwind CSS + Lucide Icons 构建</span>
      </div>
    </div>
  </footer>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 max-w-md w-full px-4 sm:px-0"></div>

    // Decodes base64 with support for UTF-8/Chinese characters
    function b64_to_utf8(str) {
      try {
        return decodeURIComponent(escape(window.atob(str)));
      } catch (e) {
        console.error("Error decoding base64:", e);
        return "# Prompt\n\n解析错误，请手动粘帖或重置。";
      }
    }

    // App Global State
    let rawMarkdown = "";
    let parsedItems = [];
    let currentSearch = "";

    // Initialize application
    window.addEventListener('DOMContentLoaded', () => {
      initTheme();
      
      // Load initial content
      if (DEFAULT_MARKDOWN_BASE64 && DEFAULT_MARKDOWN_BASE64 !== "__" + "MARKDOWN_BASE64__") {
        rawMarkdown = b64_to_utf8(DEFAULT_MARKDOWN_BASE64);
      } else {
        rawMarkdown = `# 演示 Prompt 分类

## ✨ 写作大师
\`\`\`
你是一位顶级的写作大师，请帮我润色以下内容，使其语言更加生动、条理清晰。
\`\`\`

## 💻 编程助手
\`\`\`
你是一位精通多语言的编程专家。请分析以下代码的性能瓶颈并给出优化方案。
\`\`\`
`;
      }
      
      // Initial render
      parseAndRender();
    });

    // Theme initialization and management
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      updateThemeToggleBtn();
    }

    function toggleTheme() {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
      updateThemeToggleBtn();
    }

    function updateThemeToggleBtn() {
      const isDark = document.documentElement.classList.contains('dark');
      const btn = document.getElementById('theme-toggle');
      if (!btn) return;
      
      if (isDark) {
        btn.innerHTML = `<i data-lucide="sun" class="w-5 h-5 text-amber-400"></i>`;
      } else {
        btn.innerHTML = `<i data-lucide="moon" class="w-5 h-5 text-slate-350"></i>`;
      }
      lucide.createIcons();
    }

    // Markdown Parser: Strictly matches H1 ('# ') or H2 ('## ') + immediately subsequent code block ('```')
    function parseMarkdown(mdText) {
      const lines = mdText.split(/\r?\n/);
      const items = [];
      let i = 0;
      
      while (i < lines.length) {
        const line = lines[i];
        
        // Match Level 1 heading (H1)
        if (line.startsWith('# ')) {
          const title = line.substring(2).trim();
          items.push({ type: 'h1', title });
          i++;
          continue;
        }
        
        // Match Level 2 heading (H2)
        if (line.startsWith('## ')) {
          const title = line.substring(3).trim();
          
          // STRICT RULE: Skip H2 headings starting with 🚫 and all content under them
          if (title.startsWith('🚫')) {
            let nextHeadingIdx = lines.length;
            let skipInsideCode = false;
            
            for (let j = i + 1; j < lines.length; j++) {
              const nextLine = lines[j];
              
              // Correctly track and skip inner code blocks during header search
              if (/^`{3}(?!`)/.test(nextLine.trim())) {
                skipInsideCode = !skipInsideCode;
                continue;
              }
              
              // Search for the next H1 or H2 heading outside code blocks
              if (!skipInsideCode && (nextLine.startsWith('# ') || nextLine.startsWith('## '))) {
                nextHeadingIdx = j;
                break;
              }
            }
            i = nextHeadingIdx;
            continue;
          }
          
          let code = null;
          let insideCode = false;
          const codeLines = [];
          let endIdx = -1;
          
          for (let j = i + 1; j < lines.length; j++) {
            const nextLine = lines[j];
            
            // Stop if we hit any other heading outside code block
            if ((nextLine.startsWith('# ') || nextLine.startsWith('## ') || nextLine.startsWith('### ')) && !insideCode) {
              break;
            }
            
            // Strictly match starting with exactly three backticks (not 1, not 2, not 4+)
            const trimmedLine = nextLine.trim();
            if (/^`{3}(?!`)/.test(trimmedLine)) {
              if (insideCode) {
                insideCode = false;
                code = codeLines.join('\n');
                endIdx = j;
                break;
              } else {
                insideCode = true;
              }
              continue;
            }
            
            if (insideCode) {
              codeLines.push(nextLine);
            }
          }
          
          // If we found a code block before encountering another heading, this is a valid prompt
          if (code !== null) {
            items.push({ type: 'prompt', title, code });
            i = endIdx + 1; // Advance outer pointer past the parsed code block
            continue;
          }
        }
        i++;
      }
      return items;
    }

    // Core parsing and rendering controller
    function parseAndRender() {
      // Parse items into H1 titles and H2 prompts
      parsedItems = parseMarkdown(rawMarkdown);
      
      // Render explorer prompts list
      renderExplorer();
    }

    // Dynamic rendering of flat Prompt Explorer lists
    function renderExplorer() {
      const root = document.getElementById('prompts-list-root');
      const emptyState = document.getElementById('empty-state');
      root.innerHTML = "";
      
      // Filter items based on search keyword
      // Hide H1 headers during active search
      const filteredItems = parsedItems.filter(item => {
        if (item.type === 'h1') {
          return !currentSearch;
        }
        if (!currentSearch) return true;
        return item.title.toLowerCase().includes(currentSearch.toLowerCase());
      });
      
      if (filteredPromptsExist(filteredItems) === false && currentSearch !== "") {
        emptyState.classList.remove('hidden');
        root.classList.add('hidden');
        return;
      }
      
      emptyState.classList.add('hidden');
      root.classList.remove('hidden');
      
      filteredItems.forEach((item, idx) => {
        if (item.type === 'h1') {
          // Render Level 1 headings as simple text separators
          const h1El = document.createElement('h2');
          h1El.className = "text-base font-bold text-slate-800 dark:text-slate-200 pt-6 pb-2 border-b border-slate-200/60 dark:border-slate-700/50 mt-6 first:mt-2 select-none";
          h1El.innerHTML = highlightText(item.title, currentSearch);
          root.appendChild(h1El);
        } else {
          const promptId = `prompt-${idx}`;
          const promptEl = document.createElement('div');
          
          // Premium Prompt Card styled with beautiful borders and shadows
          promptEl.className = "group/card bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-sm hover:shadow-md dark:hover:shadow-indigo-950/20 hover:border-indigo-500/30 dark:hover:border-indigo-500/20 transition-all duration-300 flex items-center justify-between cursor-pointer";
          promptEl.id = promptId;
          
          // Store prompt code and title directly as element properties (avoids escaping bugs)
          promptEl._promptCode = item.code;
          promptEl._promptTitle = item.title;
          
          promptEl.innerHTML = `
            <div class="flex-1 pr-6 min-w-0">
              <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-200 group-hover/card:text-indigo-600 dark:group-hover/card:text-indigo-400 transition-colors">
                ${highlightText(item.title, currentSearch)}
              </h3>
            </div>
            
            <button id="btn-${promptId}"
              class="btn-scale flex items-center gap-1.5 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-all duration-200 shadow-sm shadow-indigo-500/10 shrink-0">
              <i data-lucide="copy" class="w-3.5 h-3.5"></i>
              <span class="text-xs font-semibold">复制</span>
            </button>
          `;
          
          // Card click event triggers copy
          promptEl.addEventListener('click', () => {
            copyPromptCard(promptEl._promptCode, promptId, promptEl._promptTitle);
          });
          
          // Button click event stops propagation and triggers copy
          const btn = promptEl.querySelector(`#btn-${promptId}`);
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            copyPromptCard(promptEl._promptCode, promptId, promptEl._promptTitle);
          });
          
          root.appendChild(promptEl);
        }
      });
      
      lucide.createIcons();
    }

    // Helper to check if any copyable prompts exist in the filtered list
    function filteredPromptsExist(items) {
      return items.some(item => item.type === 'prompt');
    }

    // Text Highlighter for Search Results
    function highlightText(text, search) {
      if (!search) return text;
      const cleanSearch = search.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
      const regex = new RegExp(`(${cleanSearch})`, 'gi');
      return text.replace(regex, '<mark class="bg-yellow-100 dark:bg-indigo-950/80 text-indigo-700 dark:text-indigo-300 font-semibold border-b border-indigo-400 rounded-sm">$1</mark>');
    }

    // Search input handler
    function onSearchChange(val) {
      currentSearch = val.trim();
      const clearBtn = document.getElementById('clear-search-btn');
      
      if (currentSearch) {
        clearBtn.classList.remove('hidden');
      } else {
        clearBtn.classList.add('hidden');
      }
      
      renderExplorer();
    }

    function clearSearch() {
      document.getElementById('search-input').value = "";
      currentSearch = "";
      document.getElementById('clear-search-btn').classList.add('hidden');
      renderExplorer();
    }

    // Clipboard Copy Execution
    async function copyPromptCard(text, promptId, title) {
      const buttonEl = document.getElementById(`btn-${promptId}`);
      const cardEl = document.getElementById(promptId);
      
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          // Fallback clipboard method
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
        }
        
        showCopyFeedback(buttonEl, cardEl, title);
      } catch (err) {
        console.error('Copy failed: ', err);
        showToast('复制失败，请尝试手动复制', 'error');
      }
    }

    // Clipboard UI feedback controller
    function showCopyFeedback(buttonEl, cardEl, title) {
      if (!buttonEl) return;
      
      if (buttonEl.copyTimeout) {
        clearTimeout(buttonEl.copyTimeout);
      }
      
      const originalHtml = buttonEl.dataset.originalHtml || buttonEl.innerHTML;
      if (!buttonEl.dataset.originalHtml) {
        buttonEl.dataset.originalHtml = originalHtml;
      }
      
      // Change Button State to Success
      buttonEl.innerHTML = `
        <i data-lucide="check" class="w-3.5 h-3.5 text-white"></i>
        <span class="text-xs font-semibold text-white">已复制</span>
      `;
      buttonEl.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
      buttonEl.classList.add('bg-emerald-600', 'hover:bg-emerald-700');
      
      if (cardEl) {
        cardEl.classList.add('bg-emerald-50/20', 'dark:bg-emerald-950/10', 'border-l-4', 'border-l-emerald-500');
      }
      
      showToast('已成功复制 Prompt 到剪贴板', 'success', title);
      lucide.createIcons();
      
      buttonEl.copyTimeout = setTimeout(() => {
        buttonEl.innerHTML = originalHtml;
        buttonEl.classList.remove('bg-emerald-600', 'hover:bg-emerald-700');
        buttonEl.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
        
        if (cardEl) {
          cardEl.classList.remove('bg-emerald-50/20', 'dark:bg-emerald-950/10', 'border-l-4', 'border-l-emerald-500');
        }
        lucide.createIcons();
      }, 2000);
    }

    // Toast Alert Manager
    function showToast(message, type = 'success', subtitle = '') {
      const container = document.getElementById('toast-container');
      if (!container) return;
      
      const toast = document.createElement('div');
      toast.className = `
        flex items-start gap-3.5 p-4 rounded-2xl shadow-lg border backdrop-blur-md transform translate-y-2 opacity-0 transition-all duration-300 ease-out max-w-sm w-full
        ${type === 'success' 
          ? 'bg-white/95 dark:bg-slate-800/95 border-emerald-500/30 text-slate-800 dark:text-slate-100 shadow-emerald-500/5' 
          : 'bg-white/95 dark:bg-slate-800/95 border-rose-500/30 text-slate-800 dark:text-slate-100 shadow-rose-500/5'}
      `;
      
      const icon = type === 'success' 
        ? '<div class="p-1 rounded-lg bg-emerald-500/10 text-emerald-500"><i data-lucide="check" class="w-4 h-4"></i></div>' 
        : '<div class="p-1 rounded-lg bg-rose-500/10 text-rose-500"><i data-lucide="alert-circle" class="w-4 h-4"></i></div>';
        
      toast.innerHTML = `
        ${icon}
        <div class="flex-1 min-w-0">
          <p class="text-xs font-semibold leading-relaxed">${message}</p>
          ${subtitle ? `<p class="text-[10px] text-slate-400 dark:text-slate-400 mt-0.5 truncate">${subtitle}</p>` : ''}
        </div>
        <button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-350 transition-colors" onclick="this.parentElement.remove()">
          <i data-lucide="x" class="w-3.5 h-3.5"></i>
        </button>
      `;
      
      container.appendChild(toast);
      lucide.createIcons();
      
      requestAnimationFrame(() => {
        toast.classList.remove('translate-y-2', 'opacity-0');
      });
      
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-2');
        toast.addEventListener('transitionend', () => {
          toast.remove();
        });
      }, 3500);
    }
  </script>
